host: localhost:8088
info:
  contact: {}
  description: API de autenticacao e gerenciamento de usuarios
  title: Tron Legacy API
  version: "1.0"
paths:
  /admin/ai/config:
    delete:
      description: Remove a configuração de IA da organização atual
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Failed to delete AI config
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Remover configuração de IA
      tags:
      - ai
    get:
      description: Retorna se a IA está configurada para a organização atual
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AIConfigResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Obter configuração de IA
      tags:
      - ai
    put:
      consumes:
      - application/json
      description: Salva ou atualiza a configuração de IA (provider, model, API key)
        para a organização
      parameters:
      - description: Dados da configuração
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.SaveAIConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AIConfigResponse'
        "400":
          description: Dados inválidos
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Failed to save AI config
          schema:
            type: string
        "503":
          description: Encryption not configured
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Salvar configuração de IA
      tags:
      - ai
  /admin/ai/generate:
    post:
      consumes:
      - application/json
      description: Gera conteúdo (legenda ou nome de campanha) usando o provider de
        IA configurado
      parameters:
      - description: Dados para geração
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.AIGenerateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AIGenerateResponse'
        "400":
          description: Dados inválidos ou IA não configurada
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Error loading AI config
          schema:
            type: string
        "502":
          description: Erro da IA
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Gerar conteúdo com IA
      tags:
      - ai
  /admin/auto-boost/logs:
    get:
      description: Retorna logs de execução do auto-boost com filtros opcionais
      parameters:
      - description: Filtrar por rule ID
        in: query
        name: rule_id
        type: string
      - description: Filtrar por status
        in: query
        name: status
        type: string
      - description: Limite de resultados (padrão 50, máx 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AutoBoostLog'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Error listing logs
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Listar logs de auto-boost
      tags:
      - auto-boost
  /admin/auto-boost/rules:
    get:
      description: Retorna todas as regras de auto-boost da organização
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AutoBoostRule'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Error listing rules
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Listar regras de auto-boost
      tags:
      - auto-boost
    post:
      consumes:
      - application/json
      description: Cria uma nova regra de auto-boost para promover posts automaticamente
      parameters:
      - description: Dados da regra
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateAutoBoostRuleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AutoBoostRule'
        "400":
          description: Dados inválidos
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Error creating rule
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Criar regra de auto-boost
      tags:
      - auto-boost
  /admin/auto-boost/rules/{id}:
    delete:
      description: Remove uma regra de auto-boost
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Rule not found
          schema:
            type: string
        "500":
          description: Error deleting rule
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Deletar regra de auto-boost
      tags:
      - auto-boost
    get:
      description: Retorna uma regra de auto-boost pelo ID
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AutoBoostRule'
        "400":
          description: Invalid ID
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Rule not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Obter regra de auto-boost
      tags:
      - auto-boost
    patch:
      consumes:
      - application/json
      description: Alterna o estado ativo/inativo de uma regra de auto-boost
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      - description: Campo active (bool)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: active field is required
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Rule not found
          schema:
            type: string
        "500":
          description: Error toggling rule
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Ativar/desativar regra de auto-boost
      tags:
      - auto-boost
    put:
      consumes:
      - application/json
      description: Atualiza campos de uma regra de auto-boost existente
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: string
      - description: Dados para atualização
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAutoBoostRuleRequest'
