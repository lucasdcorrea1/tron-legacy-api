      tags:
      - billing
  /orgs/current/usage:
    get:
      consumes:
      - application/json
      description: Retorna o uso atual de recursos comparado aos limites do plano
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UsageResponse'
        "404":
          description: Subscription not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Obter uso de recursos da organização
      tags:
      - organizations
  /orgs/switch/{id}:
    post:
      consumes:
      - application/json
      description: Gera um novo JWT com o org_id especificado
      parameters:
      - description: ID da organização
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid organization ID
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: You are not a member of this organization
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Trocar de organização
      tags:
      - organizations
  /platform/orgs:
    get:
      description: Lista todas as organizações da plataforma (somente superadmin)
      parameters:
      - description: Página (padrão 1)
        in: query
        name: page
        type: integer
      - description: Itens por página (padrão 20, máx 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Error listing organizations
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Listar todas as organizações
      tags:
      - platform
  /platform/orgs-with-members:
    get:
      description: Retorna todas as organizações com seus membros (somente superadmin)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Error listing organizations
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Organizações com membros
      tags:
      - platform
  /platform/orgs/{id}/plan:
    put:
      consumes:
      - application/json
      description: Sobrescreve o plano de assinatura de uma organização (somente superadmin)
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      - description: Novo plano (plan_id)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid plan ID
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Subscription not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Atualizar plano de organização
      tags:
      - platform
  /platform/stats:
    get:
      description: Retorna métricas globais da plataforma (somente superadmin)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Estatísticas da plataforma
      tags:
      - platform
  /profile:
    get:
      consumes:
      - application/json
      description: Retorna o perfil do usuário autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Profile'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Profile not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Buscar perfil do usuário
      tags:
      - profile
    put:
      consumes:
      - application/json
      description: Atualiza os dados do perfil do usuário autenticado
      parameters:
      - description: Dados para atualizar
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Profile'
        "400":
          description: Invalid request body
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Profile not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Atualizar perfil do usuário
      tags:
      - profile
  /profile/avatar:
    post:
      consumes:
      - multipart/form-data
      description: Faz upload de uma imagem para o avatar do usuário. A imagem é redimensionada
        para 256x256 e comprimida.
      parameters:
      - description: Imagem do avatar (PNG ou JPEG, max 5MB)
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Profile'
        "400":
          description: Invalid image
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "413":
          description: Image too large
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Upload de foto de perfil
      tags:
      - profile
  /profile/cover-image:
    post:
      consumes:
      - multipart/form-data
      description: Faz upload de uma imagem de capa para o perfil do usuário. A imagem
        é redimensionada para 1200x400 e comprimida.
      parameters:
      - description: Imagem de capa (PNG ou JPEG, max 10MB)
        in: formData
        name: cover_image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Profile'
        "400":
          description: Invalid image
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "413":
          description: Image too large
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Upload de imagem de capa
      tags:
      - profile
  /robots.txt:
    get:
      description: Retorna o arquivo robots.txt com referência ao sitemap
      produces:
      - text/plain
      responses:
        "200":
          description: robots.txt content
          schema:
            type: string
      summary: Servir robots.txt
      tags:
      - seo
  /sitemap.xml:
    get:
      description: Gera um sitemap.xml dinâmico a partir dos posts publicados do blog
      produces:
      - text/xml
      responses:
        "200":
          description: XML sitemap
          schema:
            type: string
      summary: Gerar sitemap XML
      tags:
      - seo
  /users:
    get:
      description: Retorna lista paginada de todos os usuários com perfil. Requer
        role admin.
      parameters:
      - default: 1
        description: Página
        in: query
        name: page
        type: integer
      - default: 20
        description: Itens por página
        in: query
        name: limit
        type: integer
      - description: Buscar por nome ou email
        in: query
        name: search
        type: string
      - description: Filtrar por role (admin, author, user)
        in: query
        name: role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserListResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Listar usuários
      tags:
      - users
  /users/{id}/role:
    put:
      consumes:
      - application/json
      description: Altera a role de um usuário. Requer role admin.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Nova role
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserListItem'
        "400":
          description: Invalid request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: User not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Alterar role de um usuário
      tags:
      - users
  /webhooks/asaas:
    post:
      consumes:
      - application/json
      description: Recebe eventos de webhook do Asaas (pagamentos e assinaturas)
      parameters:
      - description: Evento do webhook
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AsaasWebhookEvent'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body
          schema:
            type: string
        "401":
          description: Invalid webhook token
          schema:
            type: string
      summary: Webhook do Asaas
      tags:
      - webhooks
  /webhooks/instagram:
    get:
      description: Handshake de verificação do webhook Meta (chamado automaticamente
        pelo Meta)
      parameters:
      - description: Modo de verificação (subscribe)
        in: query
        name: hub.mode
        required: true
        type: string
      - description: Token de verificação
        in: query
        name: hub.verify_token
        required: true
        type: string
      - description: Challenge para resposta
        in: query
        name: hub.challenge
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: Challenge response
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Server not configured
          schema:
            type: string
      summary: Verificação de webhook do Instagram
      tags:
      - webhooks
    post:
      consumes:
      - application/json
      description: Processa eventos de webhook do Instagram (comentários e DMs) com
        validação de assinatura
      parameters:
      - description: Assinatura HMAC SHA-256 do payload
        in: header
        name: X-Hub-Signature-256
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad request
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      summary: Receber evento de webhook do Instagram
      tags:
      - webhooks
securityDefinitions:
  BearerAuth:
    description: 'Digite: Bearer {seu_token_aqui}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
